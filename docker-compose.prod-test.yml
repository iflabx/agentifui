name: agentifui-prod-test

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod-test
    image: agentifui:develop-prod-test
    container_name: agentifui-prod-test-web
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://agentif:agentif@postgres:5432/agentifui_prod
      MIGRATOR_DATABASE_URL: postgresql://agentif:agentif@postgres:5432/agentifui_prod
      REDIS_URL: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      FASTIFY_PROXY_ENABLED: 1
      FASTIFY_PROXY_BASE_URL: http://api:3010
      DEPLOY_WEB_BASE_URL: http://web:3000
      DEPLOY_FASTIFY_BASE_URL: http://api:3010
    command: ['pnpm', 'start:prod']
    ports:
      - '3000:3000'
    networks:
      - test_stack
    depends_on:
      - api

  api:
    image: agentifui:develop-prod-test
    container_name: agentifui-prod-test-api
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      NODE_ENV: production
      FASTIFY_API_HOST: 0.0.0.0
      FASTIFY_API_PORT: 3010
      DATABASE_URL: postgresql://agentif:agentif@postgres:5432/agentifui_prod
      MIGRATOR_DATABASE_URL: postgresql://agentif:agentif@postgres:5432/agentifui_prod
      REDIS_URL: redis://redis:6379/1
      S3_ENDPOINT: http://minio:9000
      NEXT_UPSTREAM_BASE_URL: http://web:3000
    command: ['pnpm', 'start:prod:api']
    ports:
      - '3010:3010'
    networks:
      - test_stack

  smoke:
    image: agentifui:develop-prod-test
    container_name: agentifui-prod-test-smoke
    env_file:
      - ./.env.prod
    environment:
      DEPLOY_WEB_BASE_URL: http://web:3000
      DEPLOY_FASTIFY_BASE_URL: http://api:3010
    command: ['bash', 'scripts/smoke-prod.sh']
    networks:
      - test_stack
    depends_on:
      - web
      - api
    profiles:
      - smoke

networks:
  test_stack:
    external: true
    name: agentifui-test-stack_default
